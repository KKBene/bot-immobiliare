# GitHub Actions: scrape ogni 3 ore.
#
# RUNNER STRATEGY:
#   - Default: ubuntu-latest (cloud GitHub) → spesso bloccato da DataDome
#     per Immobiliare (IP cloud blacklist).
#   - Per uso reale: configura un self-hosted runner sul Mac (IP italiano
#     residenziale). Vedi docs/SELF_HOSTED_RUNNER.md.
#     Poi cambia `runs-on` a `[self-hosted, macbook]`.
#
# Setup secrets (Settings → Secrets and variables → Actions):
#   SUPABASE_URL, SUPABASE_SERVICE_KEY, SUPABASE_ANON_KEY,
#   TELEGRAM_BOT_TOKEN, TELEGRAM_CHAT_ID

name: scrape-cycle

on:
  schedule:
    # 3 run/giorno (orari Italia 12:00 / 18:00 / 21:00 in CEST estate).
    # In CET (inverno) si sposteranno a 11:00 / 17:00 / 20:00 IT — accettabile.
    # Consumo BirdProxies a regime: ~9 MB/cycle × 3 = 27 MB/giorno → 1 GB ≈ 38gg.
    - cron: "0 10,16,19 * * *"
  workflow_dispatch:  # trigger manuale

jobs:
  cycle:
    # Cambia a `[self-hosted, macbook]` quando avrai il runner sul Mac
    runs-on: ubuntu-latest
    timeout-minutes: 45  # raised da 30: lo scrape può durare 25-35 min con tanti privati nuovi
    env:
      SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
      SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
      SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
      TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
      TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
      TELEGRAM_CHAT_ID_LISTINGS: ${{ secrets.TELEGRAM_CHAT_ID_LISTINGS }}
      TELEGRAM_CHAT_ID_ANOMALIES: ${{ secrets.TELEGRAM_CHAT_ID_ANOMALIES }}
      # Anti-bot proxy: priorità BirdProxies → Scrapfly → Bright Data → diretto.
      # Su Actions BIRDPROXIES_ENABLED=true è obbligatorio (IP datacenter = 403 DataDome).
      BIRDPROXIES_ENABLED: "true"
      BIRDPROXIES_HOST: ${{ secrets.BIRDPROXIES_HOST }}
      BIRDPROXIES_PORT: ${{ secrets.BIRDPROXIES_PORT }}
      BIRDPROXIES_PASSWORD: ${{ secrets.BIRDPROXIES_PASSWORD }}
      SCRAPFLY_API_KEY: ${{ secrets.SCRAPFLY_API_KEY }}
      BRIGHTDATA_API_KEY: ${{ secrets.BRIGHTDATA_API_KEY }}
      BRIGHTDATA_ZONE: ${{ secrets.BRIGHTDATA_ZONE }}
      # Google Sheets sync (opzionale): webhook OR service account
      GOOGLE_SHEET_ID: ${{ secrets.GOOGLE_SHEET_ID }}
      GOOGLE_SHEETS_WEBHOOK_URL: ${{ secrets.GOOGLE_SHEETS_WEBHOOK_URL }}
      GOOGLE_SHEETS_CREDENTIALS_JSON: ${{ secrets.GOOGLE_SHEETS_CREDENTIALS_JSON }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install deps
        run: pip install -r requirements-bot.txt

      - name: Run cycle (paginazione dinamica + mark stale)
        # max-pages ridotto da 15→8: la paginazione dinamica ferma comunque
        # prima quando il backlog è esaurito. 8 pagine ≈ 240 annunci max,
        # margine 4× sul giornaliero (~60/giorno) → mai persi nuovi.
        run: python scripts/run_cycle.py --max-pages 8 --stale-hours 48
