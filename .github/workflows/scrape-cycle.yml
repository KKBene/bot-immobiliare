# GitHub Actions: scrape ogni 3 ore.
#
# RUNNER STRATEGY:
#   - Default: ubuntu-latest (cloud GitHub) → spesso bloccato da DataDome
#     per Immobiliare (IP cloud blacklist).
#   - Per uso reale: configura un self-hosted runner sul Mac (IP italiano
#     residenziale). Vedi docs/SELF_HOSTED_RUNNER.md.
#     Poi cambia `runs-on` a `[self-hosted, macbook]`.
#
# Setup secrets (Settings → Secrets and variables → Actions):
#   SUPABASE_URL, SUPABASE_SERVICE_KEY, SUPABASE_ANON_KEY,
#   TELEGRAM_BOT_TOKEN, TELEGRAM_CHAT_ID

name: scrape-cycle

on:
  schedule:
    # ogni 3 ore (UTC). GitHub Actions può ritardare di qualche minuto.
    - cron: "0 */3 * * *"
  workflow_dispatch:  # trigger manuale

jobs:
  cycle:
    # Cambia a `[self-hosted, macbook]` quando avrai il runner sul Mac
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
      SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
      SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
      TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
      TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
      # Anti-bot proxy (opzionale): priorità Scrapfly → Bright Data → diretto.
      # Basta UNO dei due. Se nessuno, fallback a curl_cffi.
      SCRAPFLY_API_KEY: ${{ secrets.SCRAPFLY_API_KEY }}
      BRIGHTDATA_API_KEY: ${{ secrets.BRIGHTDATA_API_KEY }}
      BRIGHTDATA_ZONE: ${{ secrets.BRIGHTDATA_ZONE }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install deps
        run: pip install -r requirements-bot.txt

      - name: Run cycle (paginazione dinamica + mark stale)
        run: python scripts/run_cycle.py --max-pages 15 --stale-hours 48
